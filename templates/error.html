<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{.Artist.Name}} - Details</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="Header">
         <h1>{{.Artist.Name}}</h1>
         <a href="/" class="btn">Back to Home</a>
    </div>

    <div class="main-container">
        <div class="artist-card-detail">
            <img src="{{.Artist.Image}}" alt="{{.Artist.Name}}">
            
            <div class="info-content">
                <h2>General Information</h2>
                <p><strong>Creation Date:</strong> {{.Artist.CreationDate}}</p>
                <p><strong>First Album:</strong> {{.Artist.FirstAlbum}}</p>
                
                <div class="members-container">
                    <strong>Band Members:</strong>
                    <ul class="members-list">
                        {{range .Artist.Members}}
                        <li class="member-item">{{.}}</li>
                        {{end}}
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
